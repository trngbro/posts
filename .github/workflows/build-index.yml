name: Auto-build index.json

on:
  push:
    paths:
      - 'uploads/**'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build index.json
        run: node scripts/build-index.js

      - name: Commit and push updated index.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.name "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet || (git commit -m "chore: update index.json [skip ci]" && git push)
